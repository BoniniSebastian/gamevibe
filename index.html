<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LivelyDashSB</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 🌊 BAKGRUND -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- 📱 HUD -->
<div class="hud">

  <div class="weather">
    <div class="sun"></div>
    <div>
      <div class="temp">10°</div>
      <div class="meta">Klart</div>
    </div>
  </div>

  <div class="clock" id="clock">11:14</div>
  <div class="date" id="date">Onsdag - 1 april</div>

  <div class="profile">
    <div class="profile-circle" id="profileCircle">SB</div>
    <div class="profile-switch">
      <span id="sbBtn" class="active">SB</span>
      <span>•</span>
      <span id="jaBtn">JA</span>
    </div>
  </div>

</div>

<!-- 🧩 DASHBOARD -->
<div class="dashboard">

  <div class="card glass large">Fritext</div>

  <div class="card glass small">Listor</div>

  <div class="card glass timer">
    <div id="timerText">5m</div>
  </div>

  <div class="card image"></div>
  <div class="card image"></div>

  <div class="card glass tall">Anteckningar</div>

  <div class="card solid pink">Familjenotiser</div>

  <div class="card solid teal">Träningar</div>

  <div class="card solid teal">Matcher</div>

  <div class="card solid teal" id="calendar">
    <div class="calendar-title">Idag</div>
    <div id="events"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
